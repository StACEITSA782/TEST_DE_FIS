<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipo Test FIS ACTUALIZADO - 25/26</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #7c6af7;
    --accent-light: #a89af9;
    --green: #3ecf8e;
    --green-bg: #0d2a1f;
    --red: #f87171;
    --red-bg: #2a0d0d;
    --skip: #f59e0b;
    --skip-bg: #2a1d05;
    --skip-border: #4d3510;
    --text: #e8e8f0;
    --muted: #8888a0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --shadow: rgba(0,0,0,0.4);
    --start-bg1: #1a1040;
    --start-bg2: #2d1b6e;
    --start-bg3: #1e3a6e;
    --start-bg4: #0f1a3a;
    --card-bg: rgba(22, 20, 50, 0.88);
    --card-border: rgba(140, 110, 255, 0.3);
    --card-label: #c8c0f0;
    --card-input-bg: #fff;
    --card-input-text: #111;
  }

  [data-theme="light"] {
    --bg: #f4f3ff;
    --surface: #ffffff;
    --surface2: #ededf8;
    --border: #d4d0f0;
    --accent: #5b3de8;
    --accent-light: #3d20c2;
    --green: #15803d;
    --green-bg: #dcfce7;
    --red: #dc2626;
    --red-bg: #fee2e2;
    --skip: #b45309;
    --skip-bg: #fef3c7;
    --skip-border: #fcd34d;
    --text: #1a1830;
    --muted: #6b6894;
    --shadow: rgba(91,61,232,0.08);
    --start-bg1: #ede8ff;
    --start-bg2: #ddd6fe;
    --start-bg3: #c7d2fe;
    --start-bg4: #e0e7ff;
    --card-bg: rgba(255,255,255,0.95);
    --card-border: rgba(91,61,232,0.25);
    --card-label: #4b4880;
    --card-input-bg: #f8f7ff;
    --card-input-text: #1a1830;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
    transition: background 0.3s, color 0.3s;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.3s, border-color 0.3s;
  }
  .logo { font-family: var(--mono); font-size: 14px; color: var(--accent-light); letter-spacing: 0.05em; }
  .logo span { color: var(--muted); }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .stat-badge { font-family: var(--mono); font-size: 12px; padding: 4px 10px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); transition: background 0.3s; }
  .stat-badge.ok { color: var(--green); border-color: #1e4d38; background: var(--green-bg); }
  .stat-badge.ko { color: var(--red); border-color: #4d1e1e; background: var(--red-bg); }
  [data-theme="light"] .stat-badge.ok { border-color: #86efac; }
  [data-theme="light"] .stat-badge.ko { border-color: #fca5a5; }

  .theme-toggle {
    display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none;
    padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface2); transition: all 0.2s; font-size: 12px;
    color: var(--muted); font-family: var(--mono); white-space: nowrap;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--text); }
  .toggle-track {
    width: 34px; height: 18px; border-radius: 9px; background: var(--border);
    position: relative; transition: background 0.25s; flex-shrink: 0;
  }
  [data-theme="light"] .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
    border-radius: 50%; background: var(--muted); transition: transform 0.25s, background 0.25s;
  }
  [data-theme="light"] .toggle-thumb { transform: translateX(16px); background: #fff; }
  .toggle-icon { font-size: 14px; }

  main { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }

  body.on-start {
    background: linear-gradient(135deg, var(--start-bg1) 0%, var(--start-bg2) 35%, var(--start-bg3) 70%, var(--start-bg4) 100%) !important;
    background-attachment: fixed !important;
  }

  .start-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 57px); padding: 32px 16px;
  }
  .quiz-card {
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px;
    padding: 40px 36px 36px; width: 100%; max-width: 440px;
    box-shadow: 0 8px 40px var(--shadow), 0 0 0 1px rgba(255,255,255,0.04) inset;
    backdrop-filter: blur(12px); transition: background 0.3s, border-color 0.3s;
  }
  .qm-title { font-family: var(--sans); font-size: 30px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 28px; letter-spacing: -0.02em; }
  .qm-field { margin-bottom: 18px; }
  .qm-label { display: block; font-size: 14px; color: var(--card-label); margin-bottom: 8px; font-weight: 500; text-align: center; }
  .qm-input { width: 100%; background: var(--card-input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px; font-size: 16px; color: var(--card-input-text); font-family: var(--sans); font-weight: 500; text-align: center; outline: none; transition: background 0.3s, border-color 0.3s; }
  .qm-input:focus { box-shadow: 0 0 0 3px rgba(140,110,255,0.35); border-color: var(--accent); }
  .qm-checkrow { display: flex; gap: 20px; align-items: center; margin-bottom: 24px; justify-content: center; flex-wrap: wrap; }
  .qm-check { display: flex; align-items: center; gap: 7px; font-size: 14px; color: var(--card-label); cursor: pointer; font-weight: 500; user-select: none; }
  .qm-check input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
  .qm-btn-start { width: 100%; background: linear-gradient(135deg, #5b3de8 0%, #3d6fdb 100%); border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; font-family: var(--sans); transition: opacity 0.15s, transform 0.1s; box-shadow: 0 4px 16px rgba(91,61,232,0.35); margin-bottom: 10px; }
  .qm-btn-start:hover { opacity: 0.9; transform: translateY(-1px); }
  .qm-btn-start:active { transform: translateY(0); }
  .qm-btn-practice { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; color: var(--card-label); cursor: pointer; font-family: var(--sans); transition: background 0.15s, border-color 0.15s; }
  .qm-btn-practice:hover { background: rgba(255,255,255,0.12); border-color: rgba(140,110,255,0.5); color: var(--text); }
  [data-theme="light"] .qm-btn-practice { background: var(--surface2); }
  [data-theme="light"] .qm-btn-practice:hover { background: var(--border); }
  .qm-divider { text-align: center; font-size: 12px; color: var(--muted); margin: 6px 0; font-family: var(--mono); }
  .qm-info {
    background: rgba(124,106,247,0.08); border: 1px solid rgba(124,106,247,0.2);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 22px;
    font-size: 13px; color: var(--card-label); line-height: 1.65;
  }
  [data-theme="light"] .qm-info { background: rgba(91,61,232,0.06); border-color: rgba(91,61,232,0.2); }

  .progress-wrap { margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-label { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; }
  .progress-fill { height: 3px; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }

  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 20px; transition: border-color 0.2s, box-shadow 0.2s, background 0.3s; }
  .q-card.flash-ok { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
  .q-card.flash-ko { border-color: var(--red); box-shadow: 0 0 0 1px var(--red); }
  .q-card.flash-skip { border-color: var(--skip); box-shadow: 0 0 0 1px var(--skip); }
  .q-number { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .q-text { font-size: 17px; line-height: 1.6; font-weight: 500; margin-bottom: 24px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.12s; background: var(--bg); }
  .option:hover:not(.disabled) { border-color: var(--accent); background: var(--surface2); }
  .option.selected { border-color: var(--accent); background: var(--surface2); }
  .option.correct { border-color: var(--green); background: var(--green-bg); }
  .option.wrong { border-color: var(--red); background: var(--red-bg); }
  .option.disabled { cursor: default; }
  .opt-key { font-family: var(--mono); font-size: 12px; font-weight: 500; min-width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); color: var(--muted); flex-shrink: 0; margin-top: 1px; transition: all 0.12s; }
  .option.selected .opt-key { border-color: var(--accent); color: var(--accent-light); }
  .option.correct .opt-key { border-color: var(--green); color: var(--green); background: rgba(62,207,142,0.12); }
  .option.wrong .opt-key { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.12); }
  .opt-text { font-size: 14px; line-height: 1.5; }

  .skip-row { display: flex; justify-content: center; margin-top: 14px; }
  .btn-skip {
    font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 8px 20px;
    border-radius: 8px; border: 1px dashed var(--skip-border); background: transparent;
    color: var(--skip); cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em;
  }
  .btn-skip:hover { background: var(--skip-bg); border-style: solid; }

  /* ─── FEEDBACK ─────────────────────────────── */
  .feedback { margin-top: 14px; padding: 14px 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: var(--green-bg); border: 1px solid #1e4d38; color: var(--green); }
  .feedback.ko { background: var(--red-bg); border: 1px solid #4d1e1e; color: var(--red); }
  .feedback.skipped { background: var(--skip-bg); border: 1px solid var(--skip-border); color: var(--skip); }
  .feedback strong { color: var(--text); }
  .feedback .fb-explain {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 12.5px;
    line-height: 1.65;
    opacity: 0.85;
  }
  [data-theme="light"] .feedback .fb-explain { border-top-color: rgba(0,0,0,0.08); }
  [data-theme="light"] .feedback.ok { border-color: #86efac; }
  [data-theme="light"] .feedback.ko { border-color: #fca5a5; }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 8px; }
  .btn { font-family: var(--sans); font-size: 14px; padding: 9px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.12s; font-weight: 500; }
  .btn:hover { border-color: var(--accent); color: var(--accent-light); }
  .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover { background: #6a58e5; border-color: #6a58e5; color: white; }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); font-size: 13px; }
  .btn.ghost:hover { color: var(--text); border-color: transparent; }

  .results-header { text-align: center; padding: 48px 24px 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; transition: background 0.3s; }
  .big-score { font-family: var(--mono); font-size: 72px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
  .big-score.pass { color: var(--green); }
  .big-score.fail { color: var(--red); }
  .big-score.mid { color: #f59e0b; }
  .score-label { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .score-grid { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .score-pill { font-family: var(--mono); font-size: 13px; padding: 6px 16px; border-radius: 20px; }
  .score-pill.ok { background: var(--green-bg); color: var(--green); border: 1px solid #1e4d38; }
  .score-pill.ko { background: var(--red-bg); color: var(--red); border: 1px solid #4d1e1e; }
  .score-pill.sk { background: var(--skip-bg); color: var(--skip); border: 1px solid var(--skip-border); }
  .score-pill.ns { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  [data-theme="light"] .score-pill.ok { border-color: #86efac; }
  [data-theme="light"] .score-pill.ko { border-color: #fca5a5; }
  .result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  .review-title { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; margin-top: 32px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.12s; }
  .filter-btn:hover { color: var(--text); border-color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .review-item { padding: 14px 16px; border: 1px solid var(--border); border-left-width: 3px; border-radius: 8px; margin-bottom: 10px; background: var(--surface); transition: background 0.3s; }
  .review-item.ok { border-left-color: var(--green); }
  .review-item.ko { border-left-color: var(--red); }
  .review-item.sk { border-left-color: var(--skip); }
  .review-q { font-size: 14px; font-weight: 500; margin-bottom: 6px; line-height: 1.5; }
  .review-ans { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .review-explain { font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); opacity: 0.8; }
  .review-ans .right { color: var(--green); font-weight: 500; }
  .review-ans .wrong-txt { color: var(--red); }
  .review-ans .skip-txt { color: var(--skip); }
  .back-row { margin-bottom: 20px; }

  @media (max-width: 500px) {
    .q-text { font-size: 15px; }
    .big-score { font-size: 52px; }
    header { flex-wrap: wrap; gap: 10px; }
    .theme-toggle .toggle-label { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">test<span>/</span>FIS <span>— 25·26</span></div>
  <div class="header-right">
    <div id="headerStats" style="display:flex;gap:8px;align-items:center;"></div>
    <div class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
      <span class="toggle-icon" id="themeIcon">🌙</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span class="toggle-label" style="font-size:11px;">Claro</span>
    </div>
  </div>
</header>

<main id="app"></main>

<script>
// ─── THEME ────────────────────────────────────────────────────────────────────
let currentTheme = localStorage.getItem('fis-theme') || 'dark';
document.documentElement.setAttribute('data-theme', currentTheme);
document.getElementById('themeIcon').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  localStorage.setItem('fis-theme', currentTheme);
  document.getElementById('themeIcon').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
}

// ─── AUDIO ────────────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx = null;
function getCtx() { if (!_ctx) _ctx = new AudioCtx(); return _ctx; }
function playCorrect() {
  try {
    const ctx = getCtx();
    [{freq:659.25,t:0,dur:0.12},{freq:880,t:0.13,dur:0.18}].forEach(({freq,t,dur})=>{
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sine'; osc.frequency.setValueAtTime(freq,ctx.currentTime+t);
      gain.gain.setValueAtTime(0,ctx.currentTime+t);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+t+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+dur);
      osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+dur+0.05);
    });
  } catch(e){}
}
function playWrong() {
  try {
    const ctx = getCtx();
    [{freq:220,t:0,dur:0.14},{freq:150,t:0.15,dur:0.22}].forEach(({freq,t,dur})=>{
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sawtooth'; osc.frequency.setValueAtTime(freq,ctx.currentTime+t);
      gain.gain.setValueAtTime(0,ctx.currentTime+t);
      gain.gain.linearRampToValueAtTime(0.25,ctx.currentTime+t+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+dur);
      osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+dur+0.05);
    });
  } catch(e){}
}
function playSkip() {
  try {
    const ctx = getCtx();
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='triangle'; osc.frequency.setValueAtTime(400,ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(300,ctx.currentTime+0.15);
    gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.15,ctx.currentTime+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.25);
  } catch(e){}
}

// ─── TIEMPOS DE AVANCE AUTOMÁTICO ─────────────────────────────────────────────
const DELAY_CORRECT = 2800;  // ms — tiempo para leer feedback correcto
const DELAY_WRONG   = 3500;  // ms — tiempo para leer feedback incorrecto + explicación
const DELAY_SKIP    = 2800;  // ms — tiempo para leer explicación al saltar

// ─── EXPLICACIONES ────────────────────────────────────────────────────────────
// Cada explicación corresponde por índice al array ALL_QUESTIONS
const EXPLANATIONS = [
"«Reutilización» significa aprovechar productos de trabajo ya creados (código, documentos, componentes) en lugar de construirlos desde cero, aumentando la eficiencia.",
"En MÉTRICA 3.0, una Actividad es un conjunto de Tareas. Las tareas son las unidades más pequeñas que componen una actividad.",
"Una tarea es la unidad elemental y administrable de trabajo dentro del proceso software. Varias tareas forman una actividad.",
"El software de sistema (p. ej. SO, drivers) gestiona el hardware y sirve de base para que el resto de programas funcionen.",
"UML (Unified Modeling Language) es un lenguaje gráfico estándar para visualizar, especificar y documentar sistemas software.",
"XP (Extreme Programming) usa iteraciones muy cortas (1–3 semanas) para entregar valor frecuentemente y adaptarse al cambio.",
"Upper CASE apoya fases tempranas (análisis, diseño); Lower CASE apoya fases tardías (codificación, pruebas, mantenimiento).",
"Un rectángulo estrecho sobre la línea de vida representa el período de activación: el objeto está ejecutando una operación.",
"Los modelos evolutivos son la base conceptual de los ágiles: ambos iterat, entregan incrementalmente y aceptan el cambio.",
"Un requisito verificable tiene al menos una prueba objetiva (test, inspección, análisis) que permite comprobar su cumplimiento.",
"Un proceso de desarrollo de software es el marco que define actividades, acciones, tareas, productos de trabajo y artefactos para construir software de calidad.",
"Al final de la fase de Inicio de RUP se obtiene una visión del sistema, un caso de negocio básico y el alcance delimitado del proyecto.",
"Los Diagramas de Actividad modelan el flujo de trabajo o de control entre actividades, mostrando el comportamiento dinámico del sistema.",
"El Product Owner (PO) es el responsable de maximizar el valor del producto gestionando y priorizando el Product Backlog.",
"En UML: '+' = público, '-' = privado, '#' = protegido, '~' = paquete. Por tanto '#' indica visibilidad protegida.",
"La crisis del software de los años 60 evidenció proyectos fuera de plazo y presupuesto, lo que impulsó la Ingeniería del Software.",
"RAD es adecuado cuando los requisitos están bien acotados, el equipo es pequeño y se necesita una entrega rápida (60–90 días).",

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let examBatch = 10;
let mode = '', questions = [], qIndices = [], current = 0;
// answers[i] = índice opción | 'skip' | undefined
let answers = {}, revealed = {}, filterReview = 'all';
let autoAdvanceTimer = null;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startMode(m){
  if(autoAdvanceTimer){clearTimeout(autoAdvanceTimer);autoAdvanceTimer=null;}
  mode=m; answers={}; revealed={}; current=0;
  const n=Math.min(Math.max(parseInt(document.getElementById('batchInput')?.value)||examBatch,1),ALL_QUESTIONS.length);
  examBatch=n;
  // Guardamos los índices originales para recuperar la explicación
  const allIdx = ALL_QUESTIONS.map((_,i)=>i);
  const shuffled = shuffle(allIdx);
  if(m==='exam'){
    qIndices = shuffled.slice(0,n);
  } else {
    qIndices = shuffled;
  }
  questions = qIndices.map(i=>ALL_QUESTIONS[i]);
  render();
}

function updateBatch(val){
  const n=parseInt(val);
  if(n>=1&&n<=ALL_QUESTIONS.length) examBatch=n;
}

function selectAnswer(qi,oi){
  if(answers[qi]!==undefined) return;
  if(_ctx&&_ctx.state==='suspended') _ctx.resume();
  answers[qi]=oi;
  revealed[qi]=true;
  const correct=oi===questions[qi].ans;
  if(correct) playCorrect(); else playWrong();
  render();
  if(autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  const delay = correct ? DELAY_CORRECT : DELAY_WRONG;
  autoAdvanceTimer=setTimeout(()=>{
    autoAdvanceTimer=null;
    const isLast=current===questions.length-1;
    if(isLast){
      if(mode==='exam') finalizeExam();
      else{filterReview='all';document.getElementById('app').innerHTML=renderResults();updateHeader();}
    } else { current++; render(); }
  }, delay);
}

function skipQuestion(qi){
  if(answers[qi]!==undefined) return;
  if(_ctx&&_ctx.state==='suspended') _ctx.resume();
  answers[qi]='skip';
  revealed[qi]=true;
  playSkip();
  render();
  if(autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer=setTimeout(()=>{
    autoAdvanceTimer=null;
    const isLast=current===questions.length-1;
    if(isLast){
      if(mode==='exam') finalizeExam();
      else{filterReview='all';document.getElementById('app').innerHTML=renderResults();updateHeader();}
    } else { current++; render(); }
  }, DELAY_SKIP);
}

function nav(d){
  if(autoAdvanceTimer){clearTimeout(autoAdvanceTimer);autoAdvanceTimer=null;}
  current=Math.max(0,Math.min(questions.length-1,current+d));
  render();
}
function setFilter(f){filterReview=f;render();}

function calcScore(){
  let ok=0,ko=0,skip=0,noAns=0;
  questions.forEach((_,i)=>{
    if(answers[i]===undefined) noAns++;
    else if(answers[i]==='skip') skip++;
    else if(answers[i]===questions[i].ans) ok++;
    else ko++;
  });
  return{ok,ko,skip,noAns,total:questions.length};
}

function updateHeader(){
  const h=document.getElementById('headerStats');
  if(!questions.length){h.innerHTML='';return;}
  const{ok,ko}=calcScore();
  const ans=Object.keys(answers).length;
  h.innerHTML=`<span class="stat-badge">${ans}/${questions.length}</span>${ok?`<span class="stat-badge ok">✓ ${ok}</span>`:''}${ko?`<span class="stat-badge ko">✗ ${ko}</span>`:''}`;
}

function renderStart(){
  return`<div class="start-screen">
    <div class="quiz-card">
      <div class="qm-title">Test FIS</div>
      <div class="qm-info">
      He creado un HTML para practicar estas preguntas. No puedo asegurar que todas las respuestas sean las correctas, por lo que recomiendo revisarlas y contrastarlas con los apuntes de la asignatura ante cualquier duda.
      Estas preguntas han sido recopiladas gracias a la colaboración de varios compañeros. Espero que os resulte útil para practicar, especialmente teniendo en cuenta que el año pasado se modificaron todas de las preguntas
      </div>
      <div class="qm-field">
        <label class="qm-label">Número de preguntas</label>
        <input class="qm-input" type="number" min="5" max="${ALL_QUESTIONS.length}" step="5" value="${examBatch}" id="batchInput" oninput="updateBatch(this.value)">
      </div>
      <div class="qm-checkrow">
        <label class="qm-check"><input type="checkbox" id="chkFeedback" checked> Mostrar respuestas</label>
        <label class="qm-check"><input type="checkbox" id="chkShuffle" checked> Aleatorias</label>
      </div>
      <button class="qm-btn-start" onclick="startMode('exam')">🎯 Empezar examen</button>
      <div class="qm-divider">— o —</div>
      <button class="qm-btn-practice" onclick="startMode('practice')">📚 Práctica libre · ${ALL_QUESTIONS.length} preguntas con feedback</button>
    </div>
  </div>`;
}

function getExplain(qi){
  const origIdx = qIndices[qi];
  return (origIdx !== undefined && EXPLANATIONS[origIdx]) ? EXPLANATIONS[origIdx] : '';
}

function renderQ(qi){
  const q=questions[qi];
  const ua=answers[qi];
  const shown=revealed[qi];
  const L=['A','B','C','D'];
  const isSkipped=ua==='skip';
  const isCorrect=ua!==undefined&&ua!=='skip'&&ua===q.ans;
  const cardFlash=shown?(isSkipped?' flash-skip':isCorrect?' flash-ok':' flash-ko'):'';

  const opts=q.opts.map((o,i)=>{
    let cls='option';
    if(!isSkipped){
      if(ua===i) cls+=shown?(i===q.ans?' correct':' wrong'):' selected';
      else if(shown&&i===q.ans) cls+=' correct';
    } else if(shown){
      if(i===q.ans) cls+=' correct';
    }
    if(ua!==undefined||shown) cls+=' disabled';
    return`<div class="${cls}" onclick="selectAnswer(${qi},${i})"><span class="opt-key">${L[i]}</span><span class="opt-text">${o}</span></div>`;
  }).join('');

  let skipBtn='';
  if(ua===undefined && !shown){
    skipBtn=`<div class="skip-row"><button class="btn-skip" onclick="skipQuestion(${qi})">⤳ Saltar pregunta</button></div>`;
  }

  let fb='';
  if(shown){
    const explain = getExplain(qi);
    const explainHtml = explain ? `<div class="fb-explain">💡 ${explain}</div>` : '';
    if(isSkipped){
      fb=`<div class="feedback skipped show">⤳ Pregunta saltada — Respuesta correcta: <strong>${q.opts[q.ans]}</strong>${explainHtml}</div>`;
    } else if(ua!==undefined){
      fb = ua===q.ans
        ? `<div class="feedback ok show">✓ Correcto${explainHtml}</div>`
        : `<div class="feedback ko show">✗ Incorrecto — Respuesta correcta: <strong>${q.opts[q.ans]}</strong>${explainHtml}</div>`;
    }
  }
  return`<div class="q-card${cardFlash}">
    <div class="q-number">Pregunta ${qi+1} de ${questions.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${opts}</div>
    ${skipBtn}
    ${fb}
  </div>`;
}

function renderResults(){
  const{ok,ko,skip,noAns,total}=calcScore();
  const scorable=ok+ko;
  const pct=scorable>0?Math.round((ok/scorable)*100):0;
  const scoreClass=pct>=70?'pass':pct>=50?'mid':'fail';

  const rev=questions.map((q,i)=>({
    idx:i,q:q.q,
    isSkip:answers[i]==='skip',
    isNoAns:answers[i]===undefined,
    correct:answers[i]!==undefined&&answers[i]!=='skip'&&answers[i]===q.ans,
    chosen:answers[i]!==undefined&&answers[i]!=='skip'?q.opts[answers[i]]:null,
    correctAns:q.opts[q.ans],
    explain:getExplain(i)
  }));
  const filtered=rev.filter(r=>{
    if(filterReview==='all') return true;
    if(filterReview==='ok') return r.correct;
    if(filterReview==='ko') return !r.correct&&!r.isSkip&&!r.isNoAns;
    if(filterReview==='sk') return r.isSkip||r.isNoAns;
    return true;
  });
  const revHtml=filtered.map(r=>`
    <div class="review-item ${r.correct?'ok':r.isSkip||r.isNoAns?'sk':'ko'}">
      <div class="review-q">${r.idx+1}. ${r.q}</div>
      <div class="review-ans">
        ${r.isSkip?`<span class="skip-txt">⤳ Saltada</span> · `
          :r.isNoAns?`<span class="skip-txt">Sin responder</span> · `
          :`Tu respuesta: <span class="${r.correct?'right':'wrong-txt'}">${r.chosen}</span> · `}
        Correcta: <span class="right">${r.correctAns}</span>
      </div>
      ${r.explain?`<div class="review-explain">💡 ${r.explain}</div>`:''}
    </div>`).join('');

  const skipTotal=skip+noAns;
  return`<div class="results-header">
    <div class="big-score ${scoreClass}">${pct}%</div>
    <div class="score-label">Puntuación sobre preguntas respondidas · ${ok} de ${scorable} correctas</div>
    <div class="score-grid">
      <span class="score-pill ok">✓ ${ok} correctas</span>
      <span class="score-pill ko">✗ ${ko} incorrectas</span>
      ${skip?`<span class="score-pill sk">⤳ ${skip} saltadas</span>`:''}
      ${noAns?`<span class="score-pill ns">⊘ ${noAns} sin responder</span>`:''}
    </div>
    <div class="result-btns">
      <button class="btn primary" onclick="startMode('exam')">Nuevo examen</button>
      <button class="btn" onclick="startMode('practice')">Práctica libre</button>
      <button class="btn ghost" onclick="if(autoAdvanceTimer){clearTimeout(autoAdvanceTimer);autoAdvanceTimer=null;}questions=[];qIndices=[];render()">Inicio</button>
    </div>
  </div>
  <div class="review-title">Revisión de respuestas</div>
  <div class="filter-row">
    <button class="filter-btn ${filterReview==='all'?'active':''}" onclick="setFilter('all')">Todas (${total})</button>
    <button class="filter-btn ${filterReview==='ok'?'active':''}" onclick="setFilter('ok')">Correctas (${ok})</button>
    <button class="filter-btn ${filterReview==='ko'?'active':''}" onclick="setFilter('ko')">Incorrectas (${ko})</button>
    ${skipTotal?`<button class="filter-btn ${filterReview==='sk'?'active':''}" onclick="setFilter('sk')">Saltadas/Sin responder (${skipTotal})</button>`:''}
  </div>
  ${revHtml}`;
}

function render(){
  const app=document.getElementById('app');
  updateHeader();
  if(!questions.length){
    document.body.classList.add('on-start');
    app.innerHTML=renderStart();return;
  }
  document.body.classList.remove('on-start');
  const allInteracted=Object.keys(answers).length===questions.length;
  if(mode==='exam'&&allInteracted&&!autoAdvanceTimer){
    app.innerHTML=renderResults();return;
  }
  const interacted=Object.keys(answers).length;
  const pct=Math.round((interacted/questions.length)*100);
  const isLast=current===questions.length-1;
  const curInteracted=answers[current]!==undefined;
  let rightBtn='';
  if(curInteracted||allInteracted){
    if(!isLast) rightBtn=`<button class="btn primary" onclick="nav(1)">Siguiente →</button>`;
    else if(mode==='exam') rightBtn=`<button class="btn primary" onclick="finalizeExam()">Ver resultados</button>`;
    else rightBtn=`<button class="btn primary" onclick="finalizeExam()">Ver resumen</button>`;
  }
  app.innerHTML=`
    <div class="back-row"><button class="btn ghost" onclick="if(autoAdvanceTimer){clearTimeout(autoAdvanceTimer);autoAdvanceTimer=null;}questions=[];qIndices=[];render()">← Inicio</button></div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-label">${mode==='exam'?'Examen simulado':'Práctica libre'}</span>
        <span class="progress-label">${interacted}/${questions.length} respondidas</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${renderQ(current)}
    <div class="nav-bar">
      <button class="btn" onclick="nav(-1)" ${current===0?'disabled':''}>← Anterior</button>
      <span style="font-family:var(--mono);font-size:13px;color:var(--muted)">${current+1} / ${questions.length}</span>
      ${rightBtn}
    </div>`;
}

function finalizeExam(){
  if(autoAdvanceTimer){clearTimeout(autoAdvanceTimer);autoAdvanceTimer=null;}
  filterReview='all';
  const app=document.getElementById('app');
  app.innerHTML=renderResults();
  updateHeader();
}

render();
</script>
</body>
</html>
